name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: JobTracker/UserInterface
        run: |
          npm install
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: JobTracker/UserInterface/build

  build-windows:
    needs: build-frontend
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: JobTracker/UserInterface/build

      - name: Build
        shell: pwsh
        run: .\scripts\build-windows.ps1 -Arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.arch }}
          path: publish/dist/JobTracker-*-win-${{ matrix.arch }}.zip

  build-linux:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: JobTracker/UserInterface/build

      - name: Build
        run: bash scripts/build-linux.sh ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: publish/dist/JobTracker-*-linux-${{ matrix.arch }}.tar.gz

  build-macos:
    needs: build-frontend
    strategy:
      matrix:
        include:
          - arch: x64
            runner: macos-13       # x64 runner
          - arch: arm64
            runner: macos-latest   # Apple Silicon runner
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: JobTracker/UserInterface/build

      - name: Build
        run: bash scripts/build-macos.sh ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: osx-${{ matrix.arch }}
          path: publish/dist/JobTracker-*-osx-${{ matrix.arch }}.dmg

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/win-x64/*.zip
            artifacts/win-arm64/*.zip
            artifacts/linux-x64/*.tar.gz
            artifacts/linux-arm64/*.tar.gz
            artifacts/osx-x64/*.dmg
            artifacts/osx-arm64/*.dmg